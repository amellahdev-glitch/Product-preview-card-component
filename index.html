<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <!-- link style css  -->

  <link rel="stylesheet" href="style.css">

  <!-- font awsome icon stylesheet -->

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_cart_checkout" />

  <title>Frontend Mentor | Product preview card component</title>
</head>

<body>

  <main>

    <div class="card">
      <div class="product">
        <img class="desktop" src="images/image-product-desktop.jpg" alt="perfume-picture">
        <img class="mobile" src="images/image-product-mobile.jpg" alt="perfume-picture">
      </div>

      <div class="des-container">
        <h3>PERFUME</h3>
        <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
        <p class="description"> A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.</p>
        <div class="price-container">
          <h1 class="price">$149.99</h1>
          <p class="original-price">$169.99</p>
        </div>
        <button><span class="material-symbols-outlined">
            shopping_cart_checkout
          </span>Add to Card</button>
      </div>

    </div>


  </main>


</body>

</html>
